<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards com Logo e Links</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Logo principal -->
  <img src="img/logo JDP.jpg" alt="Logo do Portal" class="logo">

  <h1>Portal Jovens Defensores Populares</h1>
  <h2>Turma das ILHAS</h2>

  <!-- Container dos cards -->
  <div class="cards-container">
    <div class="card">
      <img src="img/avaliação.jpg" alt="Logo 1">
      <h3>Avaliação da aula</h3>
      <a href="https://forms.gle/a4x4CuryuUwsybfy5" target="_blank" class="btn">Clique aqui</a>
    </div>

    <div class="card">
      <img src="img/Justificativa.jpg" alt="Logo 2">
      <h3>Justificativa de Falta</h3>
      <a href="https://forms.gle/zEpqForBAd1BpkY97" target="_blank" class="btn">Clique aqui</a>
    </div>
  </div>

</body>
</html>
